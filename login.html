<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.css">
    <title>GreenGO - Identifique-se</title>
  </head>
  <body style="min-width: 372px; background-color: #f8f9fa;">
    
    
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm mb-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="/imagens/logo_para_navbar-removebg-preview.png" alt="Logo GreenGo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNavbar">
                <ul class="navbar-nav flex-grow-1">
                    <li class="nav-item">
                        <a class="nav-link text-success" href="index.html">Principal</a>
                    </li>
                </ul>
                <div class="align-self-end">
                    <ul class="navbar-nav">
                         <li class="nav-item">
                            <a class="nav-link text-success" href="cadastro.html">Fazer Cadastro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    
<main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-5">
                            
                            <div class="text-center mb-4">
                                <img src="/imagens/Logo Green Go.jpg" alt="Logo GreenGO Completa" height="150">
                                <h2 class="mt-3 text-success">Acesse sua Conta</h2>
                            </div>
                            
                            <form>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="lembrar">
                                    <label class="form-check-label" for="lembrar">Lembrar de mim</label>
                                </div>

                                <div class="d-grid gap-2">
                                    <button class="btn btn-success btn-lg" type="submit">Entrar</button>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="text-center">
                                    <p class="mb-1">
                                        <a href="#" class="text-decoration-none text-success small">Esqueceu a senha?</a>
                                    </p>
                                    <p class="small">
                                        Ainda não tem conta? <a href="cadastro.html" class="text-decoration-none text-success fw-bold">Cadastre-se aqui</a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    
<footer class="border-top fixed-bottom text-muted bg-success">
        <div class="container">
            <div class="row py-3">
                <div class="col-12 col-md-4 text-center text-md-left text-light small">
                    &copy; 2026 GreenGO. Todos os direitos reservados.
                </div>
                <div class="col-12 col-md-4 text-center">
                    <a href="#" class="text-decoration-none text-light small">Política de Privacidade</a>
                </div>
                <div class="col-12 col-md-4 text-center text-md-right">
                    <a href="#" class="text-decoration-none text-light small">Administrar</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
