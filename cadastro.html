<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css">
    <title>GreenGO - Crie sua Conta</title>
  </head>
  <body style="min-width: 372px; background-color: #f8f9fa; padding-bottom: 80px;">
    
    
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm mb-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="imagens/logo_para_navbar-removebg-preview.png" alt="Logo GreenGo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNavbar">
                <ul class="navbar-nav flex-grow-1">
                    <li class="nav-item">
                        <a class="nav-link text-success" href="index.html">Principal</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    
<main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">
                            
                            <div class="text-center mb-4">
                                <img src="imagens/Logo Green Go.jpg" alt="Logo GreenGO Completa" height="150">
                                <h2 class="mt-3 text-success">Crie sua Conta</h2>
                            </div>
                            
                            <form>
                                
<h5 class="border-bottom pb-2 mb-3 text-secondary">Dados Pessoais</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="nome" class="form-label">Nome Completo</label>
                                        <input type="text" class="form-control" id="nome" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">E-mail</label>
                                        <input type="email" class="form-control" id="email" required>
                                    </div>
                                </div>

                                
<h5 class="border-bottom pb-2 mb-3 mt-3 text-secondary">Endereço de Entrega</h5>
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="cep" class="form-label">CEP</label>
                                        <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" onblur="pesquisacep(this.value);" required>
                                    </div>
                                    <div class="col-md-8 mb-3">
                                        <label for="rua" class="form-label">Logradouro (Rua/Avenida)</label>
                                        <input type="text" class="form-control" id="rua" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="numero" class="form-label">Número</label>
                                        <input type="text" class="form-control" id="numero" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="bairro" class="form-label">Bairro</label>
                                        <input type="text" class="form-control" id="bairro" required>
                                    </div>
                                    <div class="col-md-5 mb-3">
                                        <label for="complemento" class="form-label">Complemento</label>
                                        <input type="text" class="form-control" id="complemento" placeholder="Apto, Bloco, etc.">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-8 mb-3">
                                        <label for="cidade" class="form-label">Cidade</label>
                                        <input type="text" class="form-control" id="cidade" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="uf" class="form-label">Estado (UF)</label>
                                        <input type="text" class="form-control" id="uf" readonly>
                                    </div>
                                </div>

                                
                                        <h5 class="border-bottom pb-2 mb-3 mt-3 text-secondary">Segurança</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="senha" class="form-label">Senha</label>
                                        <input type="password" class="form-control" id="senha" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                                        <input type="password" class="form-control" id="confirmarSenha" required>
                                    </div>
                                </div>

                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="termos" required>
                                    <label class="form-check-label" for="termos">Aceito os termos de uso.</label>
                                </div>

                                <div class="d-grid gap-2">
                                    <button class="btn btn-success btn-lg" type="submit">Finalizar Cadastro</button>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="text-center">
                                    <p class="small mb-0">
                                        Já tem uma conta? <a href="login.html" class="text-decoration-none text-success fw-bold">Faça login aqui</a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    
<footer class="border-top fixed-bottom text-muted bg-success">
        <div class="container text-center py-3 text-light small">
            &copy; 2026 GreenGO. Todos os direitos reservados.
        </div>
    </footer>

    
<script>
        function limpa_formulário_cep() {
            document.getElementById('rua').value=("");
            document.getElementById('bairro').value=("");
            document.getElementById('cidade').value=("");
            document.getElementById('uf').value=("");
        }

        function meu_callback(conteudo) {
            if (!("erro" in conteudo)) {
                document.getElementById('rua').value=(conteudo.logradouro);
                document.getElementById('bairro').value=(conteudo.bairro);
                document.getElementById('cidade').value=(conteudo.localidade);
                document.getElementById('uf').value=(conteudo.uf);
                document.getElementById('numero').focus();
            } else {
                limpa_formulário_cep();
                alert("CEP não encontrado.");
            }
        }
        
        function pesquisacep(valor) {
            var cep = valor.replace(/\D/g, '');
            if (cep != "") {
                var validacep = /^[0-9]{8}$/;
                if(validacep.test(cep)) {
                    document.getElementById('rua').value="...";
                    document.getElementById('bairro').value="...";
                    document.getElementById('cidade').value="...";
                    document.getElementById('uf').value="...";

                    var script = document.createElement('script');
                    script.src = 'https://viacep.com.br/ws/'+ cep + '/json/?callback=meu_callback';
                    document.body.appendChild(script);
                } else {
                    limpa_formulário_cep();
                    alert("Formato de CEP inválido.");
                }
            } else {
                limpa_formulário_cep();
            }
        };
    </script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
